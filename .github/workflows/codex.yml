name: Build Codex Release

"on":
  repository_dispatch:
    types: [build-codex-release]
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        default: 1.0.0
        description: Release version, for example 1.2.3 or 1.2.3-alpha.1
      source_ref:
        required: true
        type: string
        default: web
        description: Source branch or commit to build from CNB. Accepts branch names, a bare 40-char commit SHA, or the full CNB commit URL for zcodex.
      release_tag:
        required: false
        type: string
        description: Optional GitHub release tag. Defaults to v<version>.
      targets:
        required: false
        type: string
        default: x86_64-unknown-linux-gnu
        description: Optional comma-separated targets. Defaults to the fastest smoke target for manual tests. Supports windows, mac, linux, all, linux-gnu, linux-musl, or explicit target triples. Full releases that publish npm are auto-expanded to all targets.
      release_repo:
        required: true
        type: string
        default: sohaha/zcodex
      publish_mode:
        required: false
        type: string
        default: build-only
        description: Release mode. Use build-only for fast smoke tests, full for build+release, or npm-only to only publish npm from an existing GitHub release.

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version || github.event.client_payload.version || github.run_id }}-${{ inputs.publish_mode || github.event.client_payload.publish_mode || 'build-only' }}-${{ inputs.source_ref || github.event.client_payload.source_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript-based actions ahead of the runner default
  # flip in 2026 to avoid surprise breakages.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      source_url: ${{ steps.payload.outputs.source_url }}
      publish_mode: ${{ steps.payload.outputs.publish_mode }}
      source_ref: ${{ steps.payload.outputs.source_ref }}
      source_sha: ${{ steps.source.outputs.source_sha }}
      version: ${{ steps.payload.outputs.version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_repo: ${{ steps.payload.outputs.release_repo }}
      targets: ${{ steps.targets.outputs.targets }}
      matrix: ${{ steps.targets.outputs.matrix }}
      should_publish_npm: ${{ steps.npm_publish_settings.outputs.should_publish }}
      npm_tag: ${{ steps.npm_publish_settings.outputs.npm_tag }}
    steps:
      - name: Resolve payload
        id: payload
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            version="${{ github.event.client_payload.version }}"
            source_ref="${{ github.event.client_payload.source_ref || 'main' }}"
            release_tag="${{ github.event.client_payload.release_tag }}"
            targets_input="${{ github.event.client_payload.targets || 'all' }}"
            release_repo="${{ github.event.client_payload.release_repo || 'sohaha/zcodex' }}"
            publish_mode="${{ github.event.client_payload.publish_mode || 'full' }}"
          else
            version="${{ inputs.version }}"
            source_ref="${{ inputs.source_ref }}"
            release_tag="${{ inputs.release_tag }}"
            targets_input="${{ inputs.targets }}"
            release_repo="${{ inputs.release_repo }}"
            publish_mode="${{ inputs.publish_mode }}"
          fi

          source_url="https://cnb.cool/zls_nmtx/sohaha/zcodex"
          case "$source_ref" in
            https://cnb.cool/zls_nmtx/sohaha/zcodex/-/commit/*)
              if [[ "$source_ref" =~ ^https://cnb\.cool/zls_nmtx/sohaha/zcodex/-/commit/([0-9a-f]{40})/?$ ]]; then
                source_ref="${BASH_REMATCH[1]}"
              else
                echo "unsupported cnb source_ref: $source_ref"
                exit 1
              fi
              ;;
            *)
              if [[ "$source_ref" =~ ^[0-9a-f]{40}$ ]]; then
                :
              elif [[ "$source_ref" =~ ^[A-Za-z0-9._/-]+$ ]]; then
                :
              else
                echo "unsupported source_ref: $source_ref"
                exit 1
              fi
              ;;
          esac

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "targets_input=${targets_input}" >> "$GITHUB_OUTPUT"
          echo "release_repo=${release_repo}" >> "$GITHUB_OUTPUT"
          echo "publish_mode=${publish_mode}" >> "$GITHUB_OUTPUT"
          echo "source_url=${source_url}" >> "$GITHUB_OUTPUT"

      - name: Validate payload
        shell: bash
        run: |
          set -euo pipefail
          source_url="${{ steps.payload.outputs.source_url }}"
          [[ "$source_url" == "https://cnb.cool/zls_nmtx/sohaha/zcodex" ]] || exit 1
          [[ "${{ steps.payload.outputs.source_ref }}" =~ ^[0-9a-f]{40}$ || "${{ steps.payload.outputs.source_ref }}" =~ ^[A-Za-z0-9._/-]+$ ]] || exit 1
          [[ "${{ steps.payload.outputs.release_repo }}" == "sohaha/zcodex" ]] || exit 1
          [[ "${{ steps.payload.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || exit 1
          case "${{ steps.payload.outputs.publish_mode }}" in
            build-only|full|npm-only)
              ;;
            *)
              echo "unsupported publish_mode: ${{ steps.payload.outputs.publish_mode }}"
              exit 1
              ;;
          esac

      - name: Validate build secrets
        if: ${{ steps.payload.outputs.publish_mode != 'npm-only' }}
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CNB_TOKEN:-}" ]]; then
            echo "请在 ${GITHUB_REPOSITORY} 仓库中设置 GitHub Actions secret: CNB_TOKEN"
            echo "路径: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Validate release secrets
        if: ${{ steps.payload.outputs.publish_mode == 'full' || steps.payload.outputs.publish_mode == 'npm-only' }}
        shell: bash
        env:
          CODEBAY_RELEASE_WRITE_TOKEN: ${{ secrets.CODEBAY_RELEASE_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CODEBAY_RELEASE_WRITE_TOKEN:-}" ]]; then
            echo "请在 ${GITHUB_REPOSITORY} 仓库中设置 GitHub Actions secret: CODEBAY_RELEASE_WRITE_TOKEN"
            echo "路径: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Normalize release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          release_tag='${{ steps.payload.outputs.release_tag }}'
          if [[ -z "$release_tag" ]]; then
            release_tag="v${{ steps.payload.outputs.version }}"
          fi
          [[ "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || exit 1
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Determine npm publish settings
        id: npm_publish_settings
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.payload.outputs.version }}"

          if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=" >> "$GITHUB_OUTPUT"
          elif [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=" >> "$GITHUB_OUTPUT"
          fi


      - name: Validate npm-only publishability
        if: ${{ steps.payload.outputs.publish_mode == 'npm-only' && steps.npm_publish_settings.outputs.should_publish != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "version ${{ steps.payload.outputs.version }} does not match npm publish rules for npm-only mode"
          exit 1

      - name: Resolve source SHA
        id: source
        if: ${{ steps.payload.outputs.publish_mode != 'npm-only' }}
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CODEBAY_RELEASE_WRITE_TOKEN: ${{ secrets.CODEBAY_RELEASE_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_URL: ${{ steps.payload.outputs.source_url }}
          SOURCE_REF: ${{ steps.payload.outputs.source_ref }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          auth_args=()
          if [[ "$SOURCE_URL" == https://github.com/* ]]; then
            source_token="${CODEBAY_RELEASE_WRITE_TOKEN:-${GITHUB_TOKEN:-}}"
            if [[ -n "$source_token" ]]; then
              basic_auth_token="$(printf '%s' "x-access-token:${source_token}" | base64 | tr -d '\n')"
              auth_args=(-c "http.extraHeader=AUTHORIZATION: basic ${basic_auth_token}")
            fi
          else
            [[ -n "${CNB_TOKEN:-}" ]] || {
              echo "missing CNB_TOKEN secret"
              exit 1
            }
            basic_auth_token="$(printf '%s' "cnb:${CNB_TOKEN}" | base64 | tr -d '\n')"
            auth_args=(-c "http.extraHeader=AUTHORIZATION: basic ${basic_auth_token}")
          fi

          ls_remote() {
            git \
              -c credential.helper= \
              -c core.askPass= \
              "${auth_args[@]}" \
              ls-remote "$SOURCE_URL" "$1" \
              | awk '{print $1}'
          }

          if [[ "$SOURCE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            tmpdir="$(mktemp -d)"
            trap 'rm -rf "$tmpdir"' EXIT
            git init -q "$tmpdir"
            git \
              -C "$tmpdir" \
              -c credential.helper= \
              -c core.askPass= \
              "${auth_args[@]}" \
              fetch --depth=1 "$SOURCE_URL" "$SOURCE_REF" >/dev/null
            source_sha="$(git -C "$tmpdir" rev-parse FETCH_HEAD)"
            rm -rf "$tmpdir"
            trap - EXIT
            echo "resolved source from explicit commit $SOURCE_REF"
          else
            source_sha="$(ls_remote "refs/tags/$RELEASE_TAG")"
            if [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "resolved source from tag $RELEASE_TAG"
            else
              source_sha="$(ls_remote "refs/heads/$SOURCE_REF")"
              if [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
                echo "resolved source from branch $SOURCE_REF"
              else
                resolved=0
                default_ref="$(git \
                  -c credential.helper= \
                  -c core.askPass= \
                  "${auth_args[@]}" \
                  ls-remote --symref "$SOURCE_URL" HEAD \
                  | awk '/^ref:/ {print $2}' | head -n1)"
                if [[ -n "$default_ref" ]]; then
                  source_sha="$(ls_remote "$default_ref")"
                  if [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
                    echo "resolved source from default branch ${default_ref#refs/heads/}"
                    resolved=1
                  fi
                fi
                if [[ "$resolved" -eq 0 && "$SOURCE_REF" != "main" ]]; then
                  source_sha="$(ls_remote "refs/heads/main")"
                  if [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
                    echo "resolved source from fallback branch main"
                    resolved=1
                  fi
                fi
                if [[ "$resolved" -eq 0 ]]; then
                  echo "failed to resolve source sha for tag $RELEASE_TAG or branch $SOURCE_REF"
                  exit 1
                fi
              fi
            fi
          fi

          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Normalize targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          raw_targets='${{ steps.payload.outputs.targets_input }}'
          raw_targets="${raw_targets//[[:space:]]/}"
          [[ -n "$raw_targets" ]] || raw_targets="all"

          if [[ "${{ steps.payload.outputs.publish_mode }}" == "full" && "${{ steps.npm_publish_settings.outputs.should_publish }}" == "true" && "$raw_targets" != "all" ]]; then
            echo "full npm-publishable release requires all targets; overriding '$raw_targets' to 'all'"
            raw_targets="all"
          fi

          declare -A seen=()
          normalized=()

          IFS=',' read -r -a requested <<< "$raw_targets"
          for item in "${requested[@]}"; do
            case "$item" in
              windows)
                expanded=(
                  "x86_64-pc-windows-msvc|windows-latest"
                  "aarch64-pc-windows-msvc|windows-latest"
                )
                ;;
              mac)
                expanded=("aarch64-apple-darwin|macos-15" "x86_64-apple-darwin|macos-15-intel")
                ;;
              linux)
                expanded=(
                  "x86_64-unknown-linux-musl|ubuntu-22.04"
                  "aarch64-unknown-linux-musl|ubuntu-24.04-arm"
                  "x86_64-unknown-linux-gnu|ubuntu-22.04"
                  "aarch64-unknown-linux-gnu|ubuntu-24.04-arm"
                )
                ;;
              linux-gnu)
                expanded=(
                  "x86_64-unknown-linux-gnu|ubuntu-22.04"
                  "aarch64-unknown-linux-gnu|ubuntu-24.04-arm"
                )
                ;;
              linux-musl)
                expanded=(
                  "x86_64-unknown-linux-musl|ubuntu-22.04"
                  "aarch64-unknown-linux-musl|ubuntu-24.04-arm"
                )
                ;;
              all)
                expanded=(
                  "x86_64-pc-windows-msvc|windows-latest"
                  "aarch64-pc-windows-msvc|windows-latest"
                  "aarch64-apple-darwin|macos-15"
                  "x86_64-apple-darwin|macos-15-intel"
                  "x86_64-unknown-linux-musl|ubuntu-22.04"
                  "aarch64-unknown-linux-musl|ubuntu-24.04-arm"
                  "x86_64-unknown-linux-gnu|ubuntu-22.04"
                  "aarch64-unknown-linux-gnu|ubuntu-24.04-arm"
                )
                ;;
              x86_64-pc-windows-msvc)
                expanded=("x86_64-pc-windows-msvc|windows-latest")
                ;;
              aarch64-pc-windows-msvc)
                expanded=("aarch64-pc-windows-msvc|windows-latest")
                ;;
              aarch64-apple-darwin)
                expanded=("aarch64-apple-darwin|macos-15")
                ;;
              x86_64-apple-darwin)
                expanded=("x86_64-apple-darwin|macos-15-intel")
                ;;
              x86_64-unknown-linux-gnu)
                expanded=("x86_64-unknown-linux-gnu|ubuntu-22.04")
                ;;
              aarch64-unknown-linux-gnu)
                expanded=("aarch64-unknown-linux-gnu|ubuntu-24.04-arm")
                ;;
              x86_64-unknown-linux-musl)
                expanded=("x86_64-unknown-linux-musl|ubuntu-22.04")
                ;;
              aarch64-unknown-linux-musl)
                expanded=("aarch64-unknown-linux-musl|ubuntu-24.04-arm")
                ;;
              *)
                echo "invalid target: $item"
                exit 1
                ;;
            esac

            for pair in "${expanded[@]}"; do
              target="${pair%%|*}"
              runner="${pair##*|}"
              if [[ -z "${seen[$target]:-}" ]]; then
                seen[$target]=1
                normalized+=("$target|$runner")
              fi
            done
          done

          targets_csv=""
          matrix="["
          for pair in "${normalized[@]}"; do
            target="${pair%%|*}"
            runner="${pair##*|}"
            if [[ -n "$targets_csv" ]]; then
              targets_csv+=","
            fi
            targets_csv+="$target"
            matrix+="{\"target\":\"$target\",\"runner\":\"$runner\"},"
          done
          matrix="${matrix%,}]"

          echo "targets=$targets_csv" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - name: Validate macOS signing secrets
        if: ${{ steps.payload.outputs.publish_mode != 'npm-only' && contains(steps.targets.outputs.targets, 'apple-darwin') }}
        shell: bash
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARIZATION_KEY_P8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
        run: |
          set -euo pipefail
          missing=()
          for var in \
            APPLE_CERTIFICATE_P12 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_NOTARIZATION_KEY_P8 \
            APPLE_NOTARIZATION_KEY_ID \
            APPLE_NOTARIZATION_ISSUER_ID; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if ((${#missing[@]} > 0)); then
            echo "missing GitHub Actions secrets required for macOS signing:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

  build:
    if: ${{ needs.resolve.outputs.publish_mode != 'npm-only' }}
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    permissions:
      contents: read
    env:
      TARGET: ${{ matrix.target }}
      SOURCE_URL: ${{ needs.resolve.outputs.source_url }}
      SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      CARGO_TARGET_DIR: ${{ github.workspace }}/build-src/codex-rs/target

    steps:
      - name: Checkout nmtx
        uses: actions/checkout@v6

      - name: Fetch source at exact SHA
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CODEBAY_RELEASE_WRITE_TOKEN: ${{ secrets.CODEBAY_RELEASE_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          build_root="${GITHUB_WORKSPACE}/build-src"
          auth_args=()
          if [[ "$SOURCE_URL" == https://github.com/* ]]; then
            source_token="${CODEBAY_RELEASE_WRITE_TOKEN:-${GITHUB_TOKEN:-}}"
            if [[ -n "$source_token" ]]; then
              basic_auth_token="$(printf '%s' "x-access-token:${source_token}" | base64 | tr -d '\n')"
              auth_args=(-c "http.extraHeader=AUTHORIZATION: basic ${basic_auth_token}")
            fi
          else
            [[ -n "${CNB_TOKEN:-}" ]] || {
              echo "missing CNB_TOKEN secret"
              exit 1
            }
            basic_auth_token="$(printf '%s' "cnb:${CNB_TOKEN}" | base64 | tr -d '\n')"
            auth_args=(-c "http.extraHeader=AUTHORIZATION: basic ${basic_auth_token}")
          fi
          attempt=1
          max_attempts=3
          until {
            rm -rf "$build_root"
            git init "$build_root"
            git \
              -C "$build_root" \
              -c credential.helper= \
              -c core.askPass= \
              "${auth_args[@]}" \
              fetch --depth=1 "$SOURCE_URL" "$SOURCE_SHA"
          }; do
            if (( attempt >= max_attempts )); then
              echo "failed to fetch source after ${attempt} attempts" >&2
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "source fetch failed on attempt ${attempt}; retrying in ${sleep_seconds}s" >&2
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done
          git -C "$build_root" checkout --force FETCH_HEAD

      - name: Verify source layout
        shell: bash
        run: |
          set -euo pipefail
          build_root="${GITHUB_WORKSPACE}/build-src"
          [[ -f "${build_root}/codex-rs/Cargo.toml" ]] || exit 1
          [[ -f "${build_root}/.github/scripts/install-musl-build-tools.sh" ]] || exit 1
          [[ -f "${build_root}/scripts/install/install.sh" ]] || exit 1
          [[ -f "${build_root}/scripts/install/install.ps1" ]] || exit 1

      - name: Sync Cargo workspace version from release
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          python3 - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["RELEASE_VERSION"]
          if re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+(?:[.-][0-9A-Za-z.-]+)?", version) is None:
              raise SystemExit(f"unsupported release version: {version}")

          cargo_toml = pathlib.Path("Cargo.toml")
          content = cargo_toml.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              content,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update workspace version in Cargo.toml")

          if 'ort-load-dynamic' not in updated:
              updated, count = re.subn(
                  r'(?m)^fastembed = "([^"]+)"$',
                  r'fastembed = { version = "\1", default-features = false, features = ["hf-hub-native-tls", "image-models", "ort-load-dynamic"] }',
                  updated,
                  count=1,
              )
              if count == 0:
                  print("fastembed dependency not found; skip compatibility patch")
              elif count != 1:
                  raise SystemExit("failed to normalize fastembed dependency in Cargo.toml")

          cargo_toml.write_text(updated, encoding="utf-8")
          PY

      - name: Patch duplicate show_buddy config
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import re

          root = pathlib.Path(os.environ["GITHUB_WORKSPACE"]) / "build-src" / "codex-rs" / "config" / "src"
          if not root.exists():
            raise SystemExit(f"missing config src dir: {root}")

          def fix_file(path: pathlib.Path) -> bool:
            text = path.read_text(encoding="utf-8")
            lines = text.splitlines(keepends=True)
            changed = False

            out = []
            in_tui_struct = False
            show_buddy_seen = False
            for line in lines:
              if not in_tui_struct and re.search(r'\bstruct\s+Tui\s*\{', line):
                in_tui_struct = True
                show_buddy_seen = False
                out.append(line)
                continue
              if in_tui_struct and re.search(r'^\s*}\s*$', line):
                in_tui_struct = False
                show_buddy_seen = False
                out.append(line)
                continue
              if in_tui_struct and re.search(r'\bshow_buddy\s*:', line):
                if show_buddy_seen:
                  while out and re.match(r'^\s*(///|#\[|\s*$)', out[-1]):
                    out.pop()
                  changed = True
                  continue
                show_buddy_seen = True
                out.append(line)
                continue
              out.append(line)

            final = []
            in_tui_literal = False
            brace_depth = 0
            show_buddy_seen_lit = False
            for line in out:
              stripped = line.lstrip()
              if (not in_tui_literal and "Tui {" in line and "struct" not in line
                  and not stripped.startswith("//")):
                in_tui_literal = True
                show_buddy_seen_lit = False
                brace_depth = line.count("{") - line.count("}")
                final.append(line)
                continue
              if in_tui_literal:
                if re.search(r'\bshow_buddy\s*:', line):
                  if show_buddy_seen_lit:
                    changed = True
                  else:
                    show_buddy_seen_lit = True
                    final.append(line)
                else:
                  final.append(line)
                brace_depth += line.count("{") - line.count("}")
                if brace_depth <= 0:
                  in_tui_literal = False
                continue
              final.append(line)

            if changed:
              path.write_text("".join(final), encoding="utf-8")
            return changed

          any_changed = False
          for path in root.rglob("*.rs"):
            if fix_file(path):
              any_changed = True

          if any_changed:
            print("patched duplicate show_buddy entries")
          else:
            print("no duplicate show_buddy entries found")
          PY

      - name: Patch Windows arg0 filename comparisons
        shell: bash
        run: |
          set -euo pipefail
          target_file="${GITHUB_WORKSPACE}/build-src/codex-rs/arg0/src/lib.rs"
          if [[ ! -f "$target_file" ]]; then
            echo "arg0 source not found; skip patch"
            exit 0
          fi
          python3 - <<'PY'
          import os
          import pathlib

          path = pathlib.Path(os.environ["GITHUB_WORKSPACE"]) / "build-src" / "codex-rs" / "arg0" / "src" / "lib.rs"
          text = path.read_text(encoding="utf-8")
          updated = text.replace(
              "for filename in &[",
              "for &filename in &[",
          )
          if updated != text:
              path.write_text(updated, encoding="utf-8")
              print("patched arg0 filename loop for windows string comparisons")
          else:
              print("arg0 filename loop already patched")
          PY

      - name: Patch missing StandaloneWindows update action
        shell: bash
        run: |
          set -euo pipefail
          target_file="${GITHUB_WORKSPACE}/build-src/codex-rs/tui/src/update_action.rs"
          if [[ ! -f "$target_file" ]]; then
            echo "update_action source not found; skip patch"
            exit 0
          fi
          cat > "$target_file" <<'EOF'
          /// Update action the CLI should perform after the TUI exits.
          #[derive(Debug, Clone, Copy, PartialEq, Eq)]
          pub enum UpdateAction {
              /// Update via `npm install -g @sohaha/zcodex@latest`.
              NpmGlobalLatest,
              /// Update via standalone Windows PowerShell installer.
              StandaloneWindows,
              /// Update via `bun install -g @sohaha/zcodex@latest`.
              BunGlobalLatest,
              /// Update via `brew upgrade codex`.
              BrewUpgrade,
          }

          impl UpdateAction {
              /// Returns the list of command-line arguments for invoking the update.
              pub fn command_args(self) -> (&'static str, &'static [&'static str]) {
                  match self {
                      UpdateAction::NpmGlobalLatest => ("npm", &["install", "-g", "@sohaha/zcodex"]),
                      UpdateAction::StandaloneWindows => ("powershell", &["-NoProfile", "-Command", "& { [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-Expression ((Invoke-WebRequest -UseBasicParsing 'https://cnb.cool/zcodex_install.ps1').Content) }"]),
                      UpdateAction::BunGlobalLatest => ("bun", &["install", "-g", "@sohaha/zcodex"]),
                      UpdateAction::BrewUpgrade => ("brew", &["upgrade", "--cask", "codex"]),
                  }
              }

              /// Returns string representation of the command-line arguments for invoking the update.
              pub fn command_str(self) -> String {
                  let (command, args) = self.command_args();
                  shlex::try_join(std::iter::once(command).chain(args.iter().copied()))
                      .unwrap_or_else(|_| format!("{command} {}", args.join(" ")))
              }
          }

          #[cfg(not(debug_assertions))]
          pub(crate) fn get_update_action() -> Option<UpdateAction> {
              let exe = std::env::current_exe().unwrap_or_default();
              let managed_by_npm = std::env::var_os("CODEX_MANAGED_BY_NPM").is_some();
              let managed_by_bun = std::env::var_os("CODEX_MANAGED_BY_BUN").is_some();

              detect_update_action(
                  cfg!(target_os = "macos"),
                  &exe,
                  managed_by_npm,
                  managed_by_bun,
              )
          }

          #[cfg(any(not(debug_assertions), test))]
          fn detect_update_action(
              is_macos: bool,
              current_exe: &std::path::Path,
              managed_by_npm: bool,
              managed_by_bun: bool,
          ) -> Option<UpdateAction> {
              if managed_by_npm {
                  Some(UpdateAction::NpmGlobalLatest)
              } else if managed_by_bun {
                  Some(UpdateAction::BunGlobalLatest)
              } else if is_macos
                  && (current_exe.starts_with("/opt/homebrew") || current_exe.starts_with("/usr/local"))
              {
                  Some(UpdateAction::BrewUpgrade)
              } else {
                  None
              }
          }

          #[cfg(test)]
          mod tests {
              use super::*;

              #[test]
              fn detects_update_action_without_env_mutation() {
                  assert_eq!(
                      detect_update_action(
                          /*is_macos*/ false,
                          std::path::Path::new("/any/path"),
                          /*managed_by_npm*/ false,
                          /*managed_by_bun*/ false
                      ),
                      None
                  );
                  assert_eq!(
                      detect_update_action(
                          /*is_macos*/ false,
                          std::path::Path::new("/any/path"),
                          /*managed_by_npm*/ true,
                          /*managed_by_bun*/ false
                      ),
                      Some(UpdateAction::NpmGlobalLatest)
                  );
                  assert_eq!(
                      detect_update_action(
                          /*is_macos*/ false,
                          std::path::Path::new("/any/path"),
                          /*managed_by_npm*/ false,
                          /*managed_by_bun*/ true
                      ),
                      Some(UpdateAction::BunGlobalLatest)
                  );
                  assert_eq!(
                      detect_update_action(
                          /*is_macos*/ true,
                          std::path::Path::new("/opt/homebrew/bin/codex"),
                          /*managed_by_npm*/ false,
                          /*managed_by_bun*/ false
                      ),
                      Some(UpdateAction::BrewUpgrade)
                  );
                  assert_eq!(
                      detect_update_action(
                          /*is_macos*/ true,
                          std::path::Path::new("/usr/local/bin/codex"),
                          /*managed_by_npm*/ false,
                          /*managed_by_bun*/ false
                      ),
                      Some(UpdateAction::BrewUpgrade)
                  );
              }
          }
          EOF
          echo "rewrote update_action.rs with Windows-compatible fixed content"

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev binutils

      - name: Install UBSan runtime
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libubsan1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ env.TARGET }}

      - name: Use git CLI for Cargo git dependencies
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

      - name: Setup MSVC toolchain
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ env.TARGET == 'aarch64-pc-windows-msvc' && 'amd64_arm64' || 'amd64' }}

      - name: Disable Unix rustc wrapper on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $configPath = Join-Path $env:GITHUB_WORKSPACE 'build-src/codex-rs/.cargo/config.toml'
          if (-not (Test-Path $configPath)) {
            throw "missing Cargo config: $configPath"
          }

          $content = Get-Content -Raw -Path $configPath
          $updated = $content -replace '(?m)^rustc-wrapper = "scripts/rustc-wrapper\.sh"\r?\n?', ''
          if ($updated -ne $content) {
            Set-Content -Path $configPath -Value $updated -Encoding utf8NoBOM
          }
          else {
            Write-Host "No Unix rustc-wrapper entry found in $configPath; skipping"
          }

      - name: Use hermetic Cargo home
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install musl build tools
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=3
          until bash "${GITHUB_WORKSPACE}/build-src/.github/scripts/install-musl-build-tools.sh"; do
            if (( attempt >= max_attempts )); then
              echo "install-musl-build-tools failed after ${attempt} attempts" >&2
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "install-musl-build-tools failed on attempt ${attempt}; retrying in ${sleep_seconds}s" >&2
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Use Zig linker for musl targets
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          linker="${CC:-}"
          if [[ -z "$linker" ]]; then
            case "${TARGET}" in
              x86_64-unknown-linux-musl)
                linker="$(command -v x86_64-linux-musl-gcc || true)"
                ;;
              aarch64-unknown-linux-musl)
                linker="$(command -v aarch64-linux-musl-gcc || true)"
                ;;
              *)
                linker=""
                ;;
            esac
          fi
          if [[ -z "$linker" ]]; then
            echo "missing musl linker for ${TARGET}" >&2
            exit 1
          fi
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=${linker}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=${linker}" >> "$GITHUB_ENV"

      - name: Configure rustc UBSan wrapper
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper="${RUNNER_TEMP}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          # Keep the musl linker configuration explicit, and add a best-effort
          # hint to reduce linker peak memory on constrained runners.
          common_rustflags="-C link-arg=-lm -C link-arg=-Wl,--no-keep-memory -C link-self-contained=no"
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${TARGET}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=${common_rustflags}" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=${common_rustflags}" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=${common_rustflags}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=${common_rustflags}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=${common_rustflags}" >> "$GITHUB_ENV"
          printf 'CARGO_ENCODED_RUSTFLAGS=-C\x1flink-arg=-lm\x1f-C\x1flink-self-contained=no\n' >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          echo "CFLAGS=$(sanitize_flags "${CFLAGS-}")" >> "$GITHUB_ENV"
          echo "CXXFLAGS=$(sanitize_flags "${CXXFLAGS-}")" >> "$GITHUB_ENV"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}
          workspaces: |
            ${{ github.workspace }}/build-src/codex-rs -> target
          cache-directories: |
            ${{ github.workspace }}/.cargo-home

      - name: Configure musl rusty_v8 artifact overrides
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          set +e
          version="$(
            awk '
              $0 == "[[package]]" {
                if (in_pkg && name == "v8" && version != "") {
                  seen[version] = 1
                }
                in_pkg = 1
                name = ""
                version = ""
                next
              }
              in_pkg && /^name = "v8"$/ {
                name = "v8"
                next
              }
              in_pkg && /^version = "/ {
                version = $0
                sub(/^version = "/, "", version)
                sub(/"$/, "", version)
                next
              }
              END {
                if (in_pkg && name == "v8" && version != "") {
                  seen[version] = 1
                }
                count = 0
                for (candidate in seen) {
                  resolved = candidate
                  count++
                }
                if (count == 0) {
                  exit 0
                }
                if (count > 1) {
                  exit 3
                }
                print resolved
              }
            ' "${GITHUB_WORKSPACE}/build-src/codex-rs/Cargo.lock"
          )"
          awk_status=$?
          set -e
          if [[ $awk_status -gt 1 ]]; then
            echo "failed to resolve v8 version from Cargo.lock"
            exit "$awk_status"
          fi
          if [[ -z "$version" ]]; then
            echo "no v8 dependency in Cargo.lock; skip rusty_v8 override"
            exit 0
          fi
          release_tag="rusty-v8-v${version}"
          base_url="https://github.com/openai/codex/releases/download/${release_tag}"
          binding_dir="${RUNNER_TEMP}/rusty_v8"
          archive_path="${binding_dir}/librusty_v8_release_${TARGET}.a.gz"
          binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
          checksums_path="${binding_dir}/rusty_v8_release_${TARGET}.sha256"
          checksums_source="${GITHUB_WORKSPACE}/build-src/third_party/v8/rusty_v8_${version//./_}.sha256"
          mkdir -p "${binding_dir}"

          curl -fsSL \
            --retry 5 \
            --retry-connrefused \
            --retry-delay 2 \
            --max-time 120 \
            "${base_url}/librusty_v8_release_${TARGET}.a.gz" \
            -o "${archive_path}"
          curl -fsSL \
            --retry 5 \
            --retry-connrefused \
            --retry-delay 2 \
            --max-time 120 \
            "${base_url}/src_binding_release_${TARGET}.rs" \
            -o "${binding_path}"

          grep -E "  (librusty_v8_release_${TARGET}[.]a[.]gz|src_binding_release_${TARGET}[.]rs)$" \
            "${checksums_source}" > "${checksums_path}"
          if [[ "$(wc -l < "${checksums_path}")" -ne 2 ]]; then
            echo "expected exactly two checksums for ${TARGET} in ${checksums_source}" >&2
            exit 1
          fi

          (cd "${binding_dir}" && sha256sum -c "${checksums_path}")
          echo "RUSTY_V8_ARCHIVE=${archive_path}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "$GITHUB_ENV"

      - name: Clear cached v8 build state for musl overrides
        if: ${{ env.TARGET == 'x86_64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-musl' }}
        shell: bash
        run: |
          set -euo pipefail
          target_root="${GITHUB_WORKSPACE}/build-src/codex-rs/target/${TARGET}/release"
          if [[ ! -d "${target_root}" ]]; then
            exit 0
          fi

          # rust-cache may restore a previously built v8 build-script state.
          # When we switch to a freshly downloaded musl archive override, Cargo
          # can reuse that stale metadata without rerunning the build script,
          # which leaves rustc looking for a library path that no longer exists.
          rm -rf "${target_root}"/build/v8-*
          rm -rf "${target_root}"/.fingerprint/v8-*

      - name: Reduce Rust build parallelism on aarch64 Linux
        if: ${{ env.TARGET == 'aarch64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          # The ubuntu-24.04-arm hosted runner is relatively constrained; rustc
          # parallelism can OOM/kill the runner and surface as "lost communication".
          echo "CARGO_BUILD_JOBS=1" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_RELEASE_DEBUG=0" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=0" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_RELEASE_STRIP=debuginfo" >> "$GITHUB_ENV"
          echo "MALLOC_ARENA_MAX=2" >> "$GITHUB_ENV"
          # If upstream enables LTO by default, overriding it helps cut peak
          # link memory and improves runner stability.
          echo "CARGO_PROFILE_RELEASE_LTO=false" >> "$GITHUB_ENV"
          # Reduce peak memory pressure during linking. (musl targets override
          # RUSTFLAGS later with their own explicit linker settings.)
          extra_rustflags="-C link-arg=-Wl,--no-keep-memory"
          if [[ -n "${RUSTFLAGS:-}" ]]; then
            extra_rustflags="${extra_rustflags} ${RUSTFLAGS}"
          fi
          echo "RUSTFLAGS=${extra_rustflags}" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=${extra_rustflags}" >> "$GITHUB_ENV"

      - name: Reduce Rust build memory on aarch64 Windows
        if: ${{ env.TARGET == 'aarch64-pc-windows-msvc' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Cross-compiling to aarch64-windows on x86_64-windows runner with
          # aggressive LTO settings causes OOM. Disable LTO and increase
          # codegen-units to reduce peak memory.
          $env:CARGO_PROFILE_RELEASE_LTO = 'false'
          $env:CARGO_PROFILE_RELEASE_CODEGEN_UNITS = '16'
          $env:CARGO_BUILD_JOBS = '1'
          Write-Host "Disabled LTO and increased codegen-units for aarch64 Windows cross-compile"

      - name: Enable swap on aarch64 Linux runner
        if: ${{ env.TARGET == 'aarch64-unknown-linux-musl' || env.TARGET == 'aarch64-unknown-linux-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          # If the runner OOM-kills the build, GitHub often reports it as
          # "lost communication". Adding swap trades speed for stability.
          size_gb="10"
          if [[ ! -f /swapfile ]]; then
            sudo fallocate -l "${size_gb}G" /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count="$((size_gb * 1024))"
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
          fi
          sudo swapon /swapfile || true
          sudo sysctl vm.swappiness=180 || true
          free -h || true
          swapon --show || true

      - name: Cargo build (Unix)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          timings=(--timings)
          if [[ "${TARGET}" == aarch64-unknown-linux-* ]]; then
            # Timings add extra I/O on a slow/constrained runner; not worth it
            # for the flakiest target.
            timings=()
          fi
          if [[ "${TARGET}" == aarch64-unknown-linux-* ]]; then
            # Link one binary at a time to reduce peak memory pressure.
            cargo build --target "${TARGET}" --release "${timings[@]}" --bin codex
            cargo build --target "${TARGET}" --release "${timings[@]}" --bin codex-responses-api-proxy
          else
            cargo build --target "${TARGET}" --release "${timings[@]}" \
              --bin codex \
              --bin codex-responses-api-proxy
          fi

      - name: Cargo build (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location "$env:GITHUB_WORKSPACE/build-src/codex-rs"

          cargo build --target $env:TARGET --release --timings `
            -p codex-cli `
            -p codex-responses-api-proxy `
            -p codex-windows-sandbox

      - name: Verify GLIBC requirements (Ubuntu 22.04)
        if: ${{ runner.os == 'Linux' && env.TARGET == 'x86_64-unknown-linux-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"

          limit="2.35"

          require_max_glibc() {
            local bin="$1"
            local dynamic_out=""

            dynamic_out="$(readelf -W --dynamic "$bin" 2>&1 || true)"
            if echo "$dynamic_out" | grep -q "There is no dynamic section"; then
              echo "${bin} is statically linked; no GLIBC requirement to verify"
              return 0
            fi

            local max=""
            max="$(
              readelf -W --version-info "$bin" \
                | grep -oE 'GLIBC_[0-9]+[.][0-9]+([.][0-9]+)?' \
                | sed 's/^GLIBC_//' \
                | sort -V \
                | tail -n 1 \
                || true
            )"
            if [[ -z "${max}" ]]; then
              echo "Failed to detect GLIBC symbol versions in ${bin}" >&2
              echo "::group::readelf --dynamic ${bin}" >&2
              echo "$dynamic_out" >&2
              echo "::endgroup::" >&2
              exit 1
            fi
            echo "${bin} max GLIBC: ${max}"
            dpkg --compare-versions "${max}" le "${limit}" \
              || { echo "❌ ${bin} requires GLIBC_${max} > GLIBC_${limit}" >&2; exit 1; }
          }

          require_max_glibc "target/${TARGET}/release/codex"
          require_max_glibc "target/${TARGET}/release/codex-responses-api-proxy"
          echo "✅ GLIBC requirements <= ${limit}"

      - name: Smoke test Windows artifacts
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $buildRoot = Join-Path $env:GITHUB_WORKSPACE "build-src/codex-rs"
          $releaseDir = Join-Path $buildRoot "target/$env:TARGET/release"

          if ($env:TARGET -eq "x86_64-pc-windows-msvc") {
            & (Join-Path $releaseDir "codex.exe") --version
            if ($LASTEXITCODE -ne 0) {
              throw "codex.exe smoke test failed"
            }

            & (Join-Path $releaseDir "codex-responses-api-proxy.exe") --help | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "codex-responses-api-proxy.exe smoke test failed"
            }
          }

          foreach ($binary in @(
            "codex.exe",
            "codex-responses-api-proxy.exe",
            "codex-windows-sandbox-setup.exe",
            "codex-command-runner.exe"
          )) {
            if (-not (Test-Path (Join-Path $releaseDir $binary))) {
              throw "missing Windows artifact: $binary"
            }
          }

      - name: Smoke test macOS artifacts
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          "target/${TARGET}/release/codex" --version
          "target/${TARGET}/release/codex-responses-api-proxy" --help >/dev/null

      - name: Smoke test Linux artifacts
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          bin_dir="target/${TARGET}/release"
          for bin in codex codex-responses-api-proxy; do
            binary_path="${bin_dir}/${bin}"
            file "${binary_path}"
            readelf -l "${binary_path}" | grep 'Requesting program interpreter' || true
            if [[ "${bin}" == "codex-responses-api-proxy" ]]; then
              "${binary_path}" --help >/dev/null
            else
              "${binary_path}" --version
            fi
          done

      - name: MacOS code signing (binaries)
        if: ${{ runner.os == 'macOS' }}
        uses: ./.github/actions/macos-code-sign
        with:
          project-root: build-src/codex-rs
          target: ${{ env.TARGET }}
          sign-binaries: "true"
          sign-dmg: "false"
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          apple-notarization-key-p8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          apple-notarization-key-id: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          apple-notarization-issuer-id: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}

      - name: Smoke test signed macOS artifacts
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          "target/${TARGET}/release/codex" --version
          "target/${TARGET}/release/codex-responses-api-proxy" --help >/dev/null

      - name: Build macOS dmg
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"

          release_dir="target/${TARGET}/release"
          dmg_root="${RUNNER_TEMP}/codex-dmg-root-${TARGET}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          dmg_path="${release_dir}/codex-${TARGET}.dmg"
          tmp_dmg_path="${RUNNER_TEMP}/codex-${TARGET}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.dmg"
          volname="Codex (${TARGET})"

          codex_binary_path="${release_dir}/codex"
          proxy_binary_path="${release_dir}/codex-responses-api-proxy"

          [[ -f "$codex_binary_path" ]] || {
            echo "binary $codex_binary_path not found"
            exit 1
          }
          [[ -f "$proxy_binary_path" ]] || {
            echo "binary $proxy_binary_path not found"
            exit 1
          }

          rm -rf "$dmg_root"
          mkdir -p "$dmg_root"
          ditto "$codex_binary_path" "${dmg_root}/codex"
          ditto "$proxy_binary_path" "${dmg_root}/codex-responses-api-proxy"

          rm -f "$dmg_path" "$tmp_dmg_path"
          for attempt in 1 2 3; do
            if hdiutil create \
              -volname "$volname" \
              -srcfolder "$dmg_root" \
              -format UDZO \
              -ov \
              "$tmp_dmg_path"; then
              mv "$tmp_dmg_path" "$dmg_path"
              break
            fi

            if [[ "$attempt" -eq 3 ]]; then
              echo "failed to build dmg after ${attempt} attempts"
              exit 1
            fi

            echo "hdiutil create failed on attempt ${attempt}; retrying after cleanup"
            rm -f "$tmp_dmg_path"
            sleep 5
          done

          [[ -f "$dmg_path" ]] || {
            echo "dmg $dmg_path not found after build"
            exit 1
          }

      - name: MacOS code signing (dmg)
        if: ${{ runner.os == 'macOS' }}
        uses: ./.github/actions/macos-code-sign
        with:
          project-root: build-src/codex-rs
          target: ${{ env.TARGET }}
          sign-binaries: "false"
          sign-dmg: "true"
          apple-certificate: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          apple-notarization-key-p8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
          apple-notarization-key-id: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          apple-notarization-issuer-id: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}

      - name: Verify macOS signed artifacts
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          release_dir="target/${TARGET}/release"
          for binary in codex codex-responses-api-proxy; do
            codesign --verify --strict --verbose=2 "${release_dir}/${binary}"
          done
          codesign --verify --verbose=2 "${release_dir}/codex-${TARGET}.dmg"
          xcrun stapler validate "${release_dir}/codex-${TARGET}.dmg"

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          ext=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ext=".exe"
          fi

          dest="dist/${TARGET}"
          mkdir -p "$dest"
          cp "target/${TARGET}/release/codex${ext}" "$dest/codex-${TARGET}${ext}"
          cp "target/${TARGET}/release/codex-responses-api-proxy${ext}" "$dest/codex-responses-api-proxy-${TARGET}${ext}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${TARGET}/release/codex-windows-sandbox-setup.exe" "$dest/codex-windows-sandbox-setup-${TARGET}.exe"
            cp "target/${TARGET}/release/codex-command-runner.exe" "$dest/codex-command-runner-${TARGET}.exe"
          fi
          if [[ "${TARGET}" == *apple-darwin ]]; then
            cp "target/${TARGET}/release/codex-${TARGET}.dmg" "$dest/codex-${TARGET}.dmg"
          fi

      - name: Compress artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src/codex-rs"
          dest="dist/${TARGET}"
          for f in "$dest"/*; do
            base="$(basename "$f")"
            if [[ "$base" == *.tar.gz || "$base" == *.zip || "$base" == *.dmg || "$base" == *.sigstore ]]; then
              continue
            fi
            tar -C "$dest" -czf "$dest/${base}.tar.gz" "$base"
            if command -v zstd >/dev/null 2>&1; then
              zstd -T0 -19 "$dest/$base"
            fi
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              (cd "$dest" && 7z a "${base}.zip" "$base")
            fi
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARGET }}
          path: ${{ github.workspace }}/build-src/codex-rs/dist/${{ env.TARGET }}/*

  release:
    if: ${{ needs.resolve.outputs.publish_mode == 'full' && needs.build.result == 'success' }}
    needs:
      - resolve
      - build
    runs-on: ubuntu-latest
    # outputs:
    #   should_publish_npm: ${{ steps.npm_publish_settings.outputs.should_publish }}
    #   npm_tag: ${{ steps.npm_publish_settings.outputs.npm_tag }}
    permissions:
      actions: read
      contents: write
    env:
      SOURCE_URL: ${{ needs.resolve.outputs.source_url }}
      SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
      SOURCE_REF: ${{ needs.resolve.outputs.source_ref }}
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      RELEASE_REPO: ${{ needs.resolve.outputs.release_repo }}
      TARGETS: ${{ needs.resolve.outputs.targets }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Fetch source metadata
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CODEBAY_RELEASE_WRITE_TOKEN: ${{ secrets.CODEBAY_RELEASE_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          build_root="${GITHUB_WORKSPACE}/build-src"
          auth_args=()
          if [[ "$SOURCE_URL" == https://github.com/* ]]; then
            source_token="${CODEBAY_RELEASE_WRITE_TOKEN:-${GITHUB_TOKEN:-}}"
            if [[ -n "$source_token" ]]; then
              basic_auth_token="$(printf '%s' "x-access-token:${source_token}" | base64 | tr -d '\n')"
              auth_args=(-c "http.extraHeader=AUTHORIZATION: basic ${basic_auth_token}")
            fi
          else
            [[ -n "${CNB_TOKEN:-}" ]] || {
              echo "missing CNB_TOKEN secret"
              exit 1
            }
            basic_auth_token="$(printf '%s' "cnb:${CNB_TOKEN}" | base64 | tr -d '\n')"
            auth_args=(-c "http.extraHeader=AUTHORIZATION: basic ${basic_auth_token}")
          fi
          rm -rf "$build_root"
          git init "$build_root"
          git \
            -C "$build_root" \
            -c credential.helper= \
            -c core.askPass= \
            "${auth_args[@]}" \
            fetch --depth=1 "$SOURCE_URL" "$SOURCE_SHA"
          git -C "$build_root" checkout --force FETCH_HEAD

      - name: Verify release artifacts
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f | grep -q . || {
            echo "no downloaded build artifacts found"
            exit 1
          }

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          notes_path="${RUNNER_TEMP}/release-notes.md"
          : > "$notes_path"
          echo "RELEASE_NOTES=$notes_path" >> "$GITHUB_ENV"

      - name: Setup pnpm
        if: ${{ needs.resolve.outputs.should_publish_npm == 'true' }}
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          package_json_file: build-src/package.json

      - name: Setup Node.js for npm packaging
        if: ${{ needs.resolve.outputs.should_publish_npm == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm packaging dependencies
        if: ${{ needs.resolve.outputs.should_publish_npm == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/build-src"
          pnpm install --frozen-lockfile

      - uses: facebook/install-dotslash@v2
        if: ${{ needs.resolve.outputs.should_publish_npm == 'true' }}

      - name: Stage npm packages
        if: ${{ needs.resolve.outputs.should_publish_npm == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/dist/npm"
          cd "${GITHUB_WORKSPACE}/build-src"
          attempt=1
          max_attempts=3
          until python3 ./scripts/stage_npm_packages.py \
            --workflow-url "$WORKFLOW_URL" \
            --release-version "$RELEASE_VERSION" \
            --package codex \
            --output-dir "${GITHUB_WORKSPACE}/dist/npm"; do
            if (( attempt >= max_attempts )); then
              echo "stage_npm_packages.py failed after ${attempt} attempts" >&2
              exit 1
            fi
            rm -rf "${GITHUB_WORKSPACE}/dist/npm"/*
            sleep_seconds=$((attempt * 15))
            echo "stage_npm_packages.py failed on attempt ${attempt}; retrying in ${sleep_seconds}s" >&2
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Normalize npm package repository metadata
        if: ${{ needs.resolve.outputs.should_publish_npm == 'true' }}
        shell: bash
        env:
          PROVENANCE_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/npm/*.tgz)
          [[ ${#tarballs[@]} -gt 0 ]] || {
            echo "no npm tarballs found to normalize"
            exit 1
          }

          for tarball in "${tarballs[@]}"; do
            workdir="$(mktemp -d)"

            tar -xzf "$tarball" -C "$workdir"

            PACKAGE_JSON="$workdir/package/package.json" node -e '
              const fs = require("fs");
              const packageJsonPath = process.env.PACKAGE_JSON;
              const repositoryUrl = process.env.PROVENANCE_REPOSITORY_URL;
              const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
              packageJson.repository = { type: "git", url: repositoryUrl };
              fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
            '

            tar -czf "$tarball" -C "$workdir" package
            rm -rf "$workdir"
          done

      - name: Resolve GitHub release token
        shell: bash
        env:
          RELEASE_WRITE_TOKEN: ${{ secrets.CODEBAY_RELEASE_WRITE_TOKEN }}
          GITHUB_ACTIONS_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh_token="${RELEASE_WRITE_TOKEN:-}"
          if [[ -z "$gh_token" ]]; then
            gh_token="${GITHUB_ACTIONS_TOKEN:-}"
          fi
          [[ -n "$gh_token" ]] || {
            echo "missing GitHub release token"
            exit 1
          }
          echo "GH_TOKEN=$gh_token" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$RELEASE_REPO" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo "$RELEASE_REPO" --title "$RELEASE_VERSION" --notes-file "$RELEASE_NOTES"
          gh release edit "$RELEASE_TAG" --repo "$RELEASE_REPO" --title "$RELEASE_VERSION" --notes-file "$RELEASE_NOTES"

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f | sort)
          [[ "${#files[@]}" -gt 0 ]] || {
            echo "no release assets found"
            exit 1
          }
          gh release upload "$RELEASE_TAG" "${files[@]}" --repo "$RELEASE_REPO" --clobber

  publish-npm:
    if: ${{ always() && needs.resolve.outputs.should_publish_npm == 'true' && ((needs.resolve.outputs.publish_mode == 'npm-only' && needs.release.result == 'skipped') || (needs.resolve.outputs.publish_mode != 'npm-only' && needs.release.result == 'success')) }}
    needs:
      - resolve
      - release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      RELEASE_REPO: ${{ needs.resolve.outputs.release_repo }}
      NPM_TAG: ${{ needs.resolve.outputs.npm_tag }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@sohaha"

      - name: Download npm tarballs from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CODEBAY_RELEASE_WRITE_TOKEN }}
          GITHUB_ACTIONS_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            export GH_TOKEN="${GITHUB_ACTIONS_TOKEN}"
          fi

          version="$RELEASE_VERSION"
          tag="$RELEASE_TAG"
          mkdir -p dist/npm

          patterns=(
            "codex-npm-${version}.tgz"
            "codex-npm-linux-*-${version}.tgz"
            "codex-npm-darwin-*-${version}.tgz"
            "codex-npm-win32-*-${version}.tgz"
          )

          for pattern in "${patterns[@]}"; do
            gh release download "$tag" \
              --repo "$RELEASE_REPO" \
              --pattern "$pattern" \
              --dir dist/npm
          done

      - name: Validate npm provenance metadata
        shell: bash
        env:
          EXPECTED_REPOSITORY: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/npm/*-"${RELEASE_VERSION}".tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "No npm tarballs found in dist/npm for version ${RELEASE_VERSION}"
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            repository_url="$(
              tar -xOf "${tarball}" package/package.json \
                | node -e '
                    let input = "";
                    process.stdin.on("data", (chunk) => {
                      input += chunk;
                    });
                    process.stdin.on("end", () => {
                      const pkg = JSON.parse(input);
                      const repository = pkg.repository;
                      const url =
                        typeof repository === "string"
                          ? repository
                          : repository?.url ?? "";
                      process.stdout.write(url);
                    });
                  '
            )"

            normalized_repository="${repository_url#git+}"
            normalized_repository="${normalized_repository%.git}"
            normalized_repository="${normalized_repository%/}"

            if [[ "${normalized_repository}" != "${EXPECTED_REPOSITORY}" ]]; then
              echo "npm provenance metadata mismatch in $(basename "${tarball}")"
              echo "  package.json repository.url: ${repository_url:-<missing>}"
              echo "  expected: ${EXPECTED_REPOSITORY}"
              exit 1
            fi
          done

      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail
          prefix=""
          if [[ -n "${NPM_TAG}" ]]; then
            prefix="${NPM_TAG}-"
          fi

          shopt -s nullglob
          tarballs=(dist/npm/*-"${RELEASE_VERSION}".tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "No npm tarballs found in dist/npm for version ${RELEASE_VERSION}"
            exit 1
          fi

          for tarball in "${tarballs[@]}"; do
            filename="$(basename "${tarball}")"
            tag=""

            case "${filename}" in
              codex-npm-linux-*-"${RELEASE_VERSION}".tgz|codex-npm-darwin-*-"${RELEASE_VERSION}".tgz|codex-npm-win32-*-"${RELEASE_VERSION}".tgz)
                platform="${filename#codex-npm-}"
                platform="${platform%-${RELEASE_VERSION}.tgz}"
                tag="${prefix}${platform}"
                ;;
              codex-npm-"${RELEASE_VERSION}".tgz)
                tag="${NPM_TAG}"
                ;;
              *)
                echo "Unexpected npm tarball: ${filename}"
                exit 1
                ;;
            esac

            publish_cmd=(npm publish "${tarball}" --access public --provenance)
            if [[ -n "${tag}" ]]; then
              publish_cmd+=(--tag "${tag}")
            fi

            echo "+ ${publish_cmd[*]}"
            set +e
            publish_output="$("${publish_cmd[@]}" 2>&1)"
            publish_status=$?
            set -e

            echo "${publish_output}"
            if [[ ${publish_status} -eq 0 ]]; then
              continue
            fi

            if grep -qiE "previously published|cannot publish over|version already exists" <<< "${publish_output}"; then
              echo "Skipping already-published package version for ${filename}"
              continue
            fi

            exit "${publish_status}"
          done

  bark-notify:
    if: ${{ always() }}
    needs:
      - resolve
      - build
      - release
      - publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BARK_URL: ${{ secrets.BARK_URL }}
    steps:
      - name: Send Bark notification
        if: ${{ env.BARK_URL != '' }}
        continue-on-error: true
        shell: bash
        env:
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PUBLISH_MODE: ${{ needs.resolve.outputs.publish_mode }}
          SHOULD_PUBLISH_NPM: ${{ needs.resolve.outputs.should_publish_npm }}
          RESOLVE_RESULT: ${{ needs.resolve.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
          PUBLISH_NPM_RESULT: ${{ needs.publish-npm.result }}
        run: |
          set -euo pipefail
          status="success"
          if [[ "$RESOLVE_RESULT" != "success" ]]; then
            status="failed"
          fi
          if [[ "$PUBLISH_MODE" == "npm-only" ]]; then
            if [[ "$PUBLISH_NPM_RESULT" != "success" ]]; then
              status="failed"
            fi
          elif [[ "$PUBLISH_MODE" == "build-only" ]]; then
            if [[ "$BUILD_RESULT" != "success" ]]; then
              status="failed"
            fi
          else
            if [[ "$BUILD_RESULT" != "success" || "$RELEASE_RESULT" != "success" ]]; then
              status="failed"
            fi
            if [[ "$SHOULD_PUBLISH_NPM" == "true" && "$PUBLISH_NPM_RESULT" != "success" ]]; then
              status="failed"
            fi
          fi

          title="codex ci ${status}"
          body="repo=${{ github.repository }} ref=${{ github.ref_name }} run=${{ github.run_number }} mode=${PUBLISH_MODE} resolve=${RESOLVE_RESULT} build=${BUILD_RESULT} release=${RELEASE_RESULT} publish_npm=${PUBLISH_NPM_RESULT}"
          curl -fsS -X POST "$BARK_URL" \
            --data-urlencode "title=${title}" \
            --data-urlencode "body=${body}" \
            --data-urlencode "url=${WORKFLOW_URL}" \
            --data-urlencode "group=github-actions" \
            --data-urlencode "level=active"

      - name: Skip Bark when secret missing
        if: ${{ env.BARK_URL == '' }}
        shell: bash
        run: echo "BARK_URL secret is empty, skip Bark notification."
